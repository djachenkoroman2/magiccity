# Terrain relief: shifted tile with elevated noisy ground and margin-aware buildings.
seed: 404
tile:
  x: -1
  z: 0
  size_m: 256
  margin_m: 64
terrain:
  base_height_m: 12
  height_noise_m: 6
roads:
  model: grid
  spacing_m: 80
  width_m: 9
  sidewalk_width_m: 3
buildings:
  enabled: true
  min_height_m: 10
  max_height_m: 45
  setback_m: 8
  footprint_min_m: 14
  footprint_max_m: 30
sampling:
  mode: surface
  ground_spacing_m: 2
  road_spacing_m: 1.5
  building_spacing_m: 2
  jitter_ratio: 0.18
output:
  format: ply
  include_rgb: true
  include_class: true
