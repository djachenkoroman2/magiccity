# Radial-ring city: downtown center with rays and concentric ring roads.
seed: 606
tile:
  x: 0
  z: 0
  size_m: 256
  margin_m: 56
terrain:
  base_height_m: 0
  height_noise_m: 0.9
urban_fields:
  enabled: true
  center_x: 128
  center_z: 128
  city_radius_m: 440
  noise_scale_m: 170
  density_bias: 0.08
roads:
  model: radial_ring
  spacing_m: 54
  width_m: 10
  sidewalk_width_m: 3
  radial_count: 16
  ring_spacing_m: 58
buildings:
  enabled: true
  min_height_m: 12
  max_height_m: 76
  setback_m: 5
  footprint_min_m: 12
  footprint_max_m: 32
sampling:
  mode: surface
  ground_spacing_m: 3
  road_spacing_m: 2
  building_spacing_m: 2.5
  jitter_ratio: 0.12
output:
  format: ply
  include_rgb: true
  include_class: true
