# Mixed road model driven by urban fields and biomes.
seed: 1001
tile:
  x: 0
  z: 0
  size_m: 1000
  margin_m: 64
terrain:
  base_height_m: 0
  height_noise_m: 2.2
urban_fields:
  enabled: true
  center_x: 160
  center_z: 160
  city_radius_m: 250
  noise_scale_m: 120
  density_bias: 0.04
  industrial_bias: 0.08
  green_bias: 0.02
roads:
  model: mixed
  spacing_m: 76
  width_m: 8
  sidewalk_width_m: 2.5
  angle_degrees: 18
  radial_count: 14
  ring_spacing_m: 64
  organic_wander_m: 18
buildings:
  enabled: true
  min_height_m: 7
  max_height_m: 72
  setback_m: 5
  footprint_min_m: 10
  footprint_max_m: 30
sampling:
  mode: surface
  ground_spacing_m: 5
  road_spacing_m: 3.5
  building_spacing_m: 4
  jitter_ratio: 0.2
output:
  format: ply
  include_rgb: true
  include_class: true
