# Four neighboring tiles generated in one CLI run.
seed: 1112
tiles:
  items:
    - {x: 0, z: 0}
    - {x: 1, z: 0}
    - {x: 0, z: 1}
    - {x: 1, z: 1}
  size_m: 128
  margin_m: 40
terrain:
  base_height_m: 0
  height_noise_m: 1.8
urban_fields:
  enabled: true
  center_x: 128
  center_z: 128
  city_radius_m: 360
  noise_scale_m: 180
roads:
  model: mixed
  spacing_m: 42
  width_m: 8
  sidewalk_width_m: 2.5
  radial_count: 10
  ring_spacing_m: 52
  organic_wander_m: 12
buildings:
  enabled: true
  min_height_m: 6
  max_height_m: 48
  setback_m: 5
  footprint_min_m: 10
  footprint_max_m: 26
sampling:
  mode: surface
  ground_spacing_m: 5
  road_spacing_m: 3.5
  building_spacing_m: 4
  jitter_ratio: 0.18
output:
  format: ply
  include_rgb: true
  include_class: true
