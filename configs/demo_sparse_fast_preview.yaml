# Fast preview: large tile with coarse sampling and varied building heights.
seed: 606
tile:
  x: 0
  z: 0
  size_m: 384
  margin_m: 32
terrain:
  base_height_m: 0
  height_noise_m: 1.5
roads:
  model: grid
  spacing_m: 128
  width_m: 12
  sidewalk_width_m: 4
buildings:
  enabled: true
  min_height_m: 8
  max_height_m: 80
  setback_m: 10
  footprint_min_m: 20
  footprint_max_m: 48
sampling:
  mode: surface
  ground_spacing_m: 6
  road_spacing_m: 4
  building_spacing_m: 5
  jitter_ratio: 0.35
output:
  format: ply
  include_rgb: true
  include_class: true
