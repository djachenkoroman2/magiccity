# Low-rise suburb: larger blocks, wider setbacks, moderate terrain variation.
seed: 202
tile:
  x: 1
  z: 0
  size_m: 256
  margin_m: 32
terrain:
  base_height_m: 2
  height_noise_m: 2.5
roads:
  model: grid
  spacing_m: 96
  width_m: 8
  sidewalk_width_m: 2
buildings:
  enabled: true
  min_height_m: 4
  max_height_m: 18
  setback_m: 12
  footprint_min_m: 10
  footprint_max_m: 24
sampling:
  mode: surface
  ground_spacing_m: 3
  road_spacing_m: 2
  building_spacing_m: 2.5
  jitter_ratio: 0.25
output:
  format: ply
  include_rgb: true
  include_class: true
