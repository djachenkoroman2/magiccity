# Radial city: streets radiate from a central point without ring roads.
seed: 707
tile:
  x: 0
  z: 0
  size_m: 256
  margin_m: 48
terrain:
  base_height_m: 0
  height_noise_m: 1
urban_fields:
  enabled: true
  center_x: 128
  center_z: 128
  city_radius_m: 420
  noise_scale_m: 180
roads:
  model: radial
  spacing_m: 56
  width_m: 10
  sidewalk_width_m: 3
  angle_degrees: 8
  radial_count: 16
buildings:
  enabled: true
  min_height_m: 8
  max_height_m: 52
  setback_m: 6
  footprint_min_m: 12
  footprint_max_m: 30
sampling:
  mode: surface
  ground_spacing_m: 3
  road_spacing_m: 2
  building_spacing_m: 2.5
  jitter_ratio: 0.14
output:
  format: ply
  include_rgb: true
  include_class: true
